services:
  - type: web
    name: contrato-seguro-ia
    runtime: python
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      apt-get update &&
      apt-get install -y tesseract-ocr tesseract-ocr-por
    startCommand: python run_app.py
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: STREAMLIT_SERVER_ADDRESS
        value: 0.0.0.0
      - key: GOOGLE_REDIRECT_URI
        value: https://jus.trustcorp.com.br
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SENDER_EMAIL
        sync: false
