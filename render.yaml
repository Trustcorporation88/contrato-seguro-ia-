services:
  - type: web
    name: contrato-seguro-ia
    runtime: docker
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: STREAMLIT_SERVER_ADDRESS
        value: 0.0.0.0
      - key: GOOGLE_REDIRECT_URI
        value: https://jus.trustcorp.com.br
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SENDER_EMAIL
        sync: false
